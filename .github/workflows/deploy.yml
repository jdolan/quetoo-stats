name: Deploy to giblets

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deployment is handled by a GitHub webhook configured to POST to
# https://giblets.quetoo.org/deploy on push to main.
# The webhook secret is stored as DEPLOY_SECRET in config.local.php on the server.
# This workflow exists only to document the deploy process and can be used
# to manually re-trigger a deploy via workflow_dispatch + the step below if needed.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" | awk '{print $2}')"
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            https://giblets.quetoo.org/deploy
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
