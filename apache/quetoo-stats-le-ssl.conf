<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName giblets.quetoo.org
  DocumentRoot /var/www/quetoo-stats

  <Directory /var/www/quetoo-stats>
    Options -Indexes
    AllowOverride All
    Require all granted
  </Directory>

  # Route /api/* to the PHP scripts
  <Directory /var/www/quetoo-stats/api>
    Options -Indexes
    AllowOverride None
    Require all granted
  </Directory>

    # CORS — allow quetoo.org (production) and localhost (dev)
  SetEnvIf Origin "^(https://quetoo.org|http://localhost:[0-9]+)$" CORS_ORIGIN=$0
  Header set Access-Control-Allow-Origin "%{CORS_ORIGIN}e" env=CORS_ORIGIN
  Header set Access-Control-Allow-Methods "GET, OPTIONS"
  Header set Access-Control-Allow-Headers "Content-Type"

  ErrorLog ${APACHE_LOG_DIR}/quetoo-stats-error.log
  CustomLog ${APACHE_LOG_DIR}/quetoo-stats-access.log combined

SSLCertificateFile /etc/letsencrypt/live/giblets.quetoo.org/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/giblets.quetoo.org/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
